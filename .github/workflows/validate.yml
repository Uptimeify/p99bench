name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install jsonschema pyyaml

      - name: Validate result files against schema and policy
        run: python3 tools/validate.py results/

      - name: Verify grades match bands
        # validate.py already checks this per-file, but this makes the failure
        # mode obvious in the job list: a hand-edited grade is not a schema
        # error, it is a trust problem.
        run: |
          fail=0
          shopt -s nullglob globstar
          for f in results/**/*.json; do
            tmp=$(mktemp)
            cp "$f" "$tmp"
            python3 tools/grade.py "$tmp" --in-place
            if ! diff -q "$f" "$tmp" >/dev/null; then
              echo "::error file=$f::grades do not match schema/thresholds.yaml"
              diff "$f" "$tmp" || true
              fail=1
            fi
            rm -f "$tmp"
          done
          exit $fail

      - name: Check generated artifacts are current
        # Generated files are never hand-edited: RESULTS.md, the per-provider
        # pages and the data export are all a pure function of results/ plus
        # schema/thresholds.yaml. --check names every stale file at once
        # instead of failing on the first diff.
        run: |
          python3 tools/render.py --check

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          # SC1091: lib.sh is sourced at runtime, shellcheck cannot follow it
          shellcheck -e SC1091 bench/*.sh

  smoke:
    # The scripts must at least run. We cannot benchmark meaningfully on a
    # shared CI runner, so this only proves they do not crash and emit valid
    # JSON fragments -- never treat CI output as a result.
    #
    # Every step runs under `sudo -E` so that all fragments end up owned by the
    # same user. Mixing root and non-root steps leaves /tmp/p99bench owned by
    # root and the next step cannot write to it.
    runs-on: ubuntu-latest
    env:
      P99_WORK: /tmp/p99bench
    steps:
      - uses: actions/checkout@v4

      - name: Install bench deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fio sysbench jq bc redis-tools curl iputils-ping rt-tests
          pip install pyyaml

      - name: Smoke test disk script
        env:
          P99_TARGET: /tmp/p99smoke
          P99_SIZE: 1G
          P99_RUNTIME: 5
        run: |
          sudo -E bash bench/01-disk.sh
          sudo jq -e '.disk.wal_fsync.iops != null' "$P99_WORK/frag-disk.json"

      - name: Smoke test latency script
        env:
          P99_LATENCY_DURATION: 5
        run: |
          sudo -E bash bench/05-latency.sh
          # Percentiles must exist and be ordered. This is the assertion the
          # old max-only metric could not support.
          sudo jq -e '.cpu.stall_p999_us != null' "$P99_WORK/frag-latency.json"
          sudo jq -e '.cpu.stall_p99_us <= .cpu.stall_p999_us' "$P99_WORK/frag-latency.json"
          sudo jq -e '.cpu.stall_p999_us <= .cpu.stall_max_us' "$P99_WORK/frag-latency.json"

      - name: Smoke test CPU steady script
        env:
          P99_CPU_STEADY_MIN: 1
        run: |
          sudo -E bash bench/02b-cpu-steady.sh
          sudo jq -e '.cpu.steady_state.degradation_pct != null' "$P99_WORK/frag-cpu-steady.json"

      - name: Smoke test network script
        # Runners have egress, so this exercises the real path. It is not a
        # measurement of anything: a shared CI runner's uplink is meaningless.
        # We only assert the script emits a well-formed fragment either way --
        # reachable=false is just as valid an outcome as reachable=true.
        run: |
          sudo -E bash bench/06-network.sh
          sudo jq -e '.network.reachable != null' "$P99_WORK/frag-network.json"

      - name: Network targets file is parseable
        run: |
          python3 - <<'PY'
          import yaml
          d = yaml.safe_load(open('schema/network-targets.yaml'))
          assert d['targets'], 'no targets defined'
          for t in d['targets']:
              for k in ('id', 'url', 'ping_host'):
                  assert t.get(k), f"target {t.get('id', '?')} missing {k}"
          print(f"{len(d['targets'])} targets, list v{d['list_version']}")
          PY

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Run tests
        # Docker-marked stage tests are covered by the smoke job above; here we
        # run the tier that needs no benchmark tools.
        run: python3 -m pytest tests/ -v -m "not docker"

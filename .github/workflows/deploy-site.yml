name: deploy-site

on:
  push:
    branches: [main]
    # Only rebuild when data or the site itself changes.
    paths:
      - 'web/**'
      - 'data/**'
      - 'results/**'
      - '.github/workflows/deploy-site.yml'
  schedule:
    # Nightly backstop at 03:17 UTC (off the hour to avoid Actions congestion).
    - cron: '17 3 * * *'
  workflow_dispatch: {}

# Pages deploy needs these; least-privilege otherwise.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Unit tests
        working-directory: web
        run: npm test
      - name: Build
        working-directory: web
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
